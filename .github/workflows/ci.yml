name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    # Playwright golden-path E2E + Lighthouse budget check. Kept as its OWN job
    # so a browser/perf flake here is clearly separable from the core gate above.
    # Runs in MOCK mode: no DATABASE_URL, no secrets.
    name: E2E + Lighthouse
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Playwright E2E (golden path)
        run: npm run e2e

      - name: Lighthouse budgets (published site)
        run: npm run lighthouse
